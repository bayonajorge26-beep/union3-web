<!-- @dsCard group="Colors" viewport="700x130" name="Red scale" subtitle="Accent states — hover, press, glow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-sans);}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
  .sw{flex:1;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .t{font-size:10px;font-family:monospace;color:rgba(255,255,255,.92);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#8F0000"><span class="t">700</span></div>
  <div class="sw" style="background:#A30000"><span class="t">600 press</span></div>
  <div class="sw" style="background:#CC0000"><span class="t">500 base</span></div>
  <div class="sw" style="background:#E51515"><span class="t">400 hover</span></div>
  <div class="sw" style="background:#FF3B3B"><span class="t" style="color:#0A0A0A">300 glow</span></div>
</div>
</body></html>
