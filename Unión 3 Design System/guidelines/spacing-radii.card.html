<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & shadows" subtitle="Tight corners, deep shadows, red glow" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:22px 28px;font-family:var(--font-sans);}
  .row{display:flex;gap:22px;align-items:center;}
  .box{width:84px;height:60px;background:var(--surface-card);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
  .n{font-size:10px;color:var(--text-subtle);font-family:monospace;}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:0"><span class="n">0</span></div>
  <div class="box" style="border-radius:2px"><span class="n">sm 2</span></div>
  <div class="box" style="border-radius:4px"><span class="n">md 4</span></div>
  <div class="box" style="border-radius:8px"><span class="n">lg 8</span></div>
  <div class="box" style="border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.55);border:none"><span class="n">shadow-md</span></div>
  <div class="box" style="border-radius:4px;box-shadow:0 8px 28px rgba(204,0,0,.35);border:none"><span class="n" style="color:#fff">glow</span></div>
</div>
</body></html>
