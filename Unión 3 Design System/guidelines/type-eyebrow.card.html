<!-- @dsCard group="Type" viewport="700x110" name="Eyebrow / caps" subtitle="Wide-tracked uppercase overline" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:30px 28px;font-family:var(--font-sans);}
  .e{display:inline-flex;align-items:center;gap:12px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.22em;color:var(--text-muted);}
  .tick{width:28px;height:3px;background:var(--accent);}
  .meta{margin-top:14px;font-size:11px;color:var(--text-subtle);font-family:monospace;}
</style></head><body>
  <span class="e"><span class="tick"></span>Nuestros servicios</span>
  <div class="meta">Archivo 700 · 12px · ls 0.22em (--ls-eyebrow) · + red tick</div>
</body></html>
