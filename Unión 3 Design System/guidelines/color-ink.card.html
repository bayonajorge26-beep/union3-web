<!-- @dsCard group="Colors" viewport="700x130" name="Ink & surfaces" subtitle="Dark surface ramp + hairline borders" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-sans);}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
  .sw{flex:1;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .t{font-size:10px;font-family:monospace;color:var(--text-muted);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#0A0A0A"><span class="t">900 bg</span></div>
  <div class="sw" style="background:#111111"><span class="t">850 raised</span></div>
  <div class="sw" style="background:#161616"><span class="t">800 card</span></div>
  <div class="sw" style="background:#1C1C1C"><span class="t">750 hover</span></div>
  <div class="sw" style="background:#242424"><span class="t">700</span></div>
  <div class="sw" style="background:#2E2E2E"><span class="t">600 border</span></div>
  <div class="sw" style="background:#3A3A3A"><span class="t">500</span></div>
</div>
</body></html>
