<!-- @dsCard group="Brand" viewport="700x150" name="Motion & easing" subtitle="Hover lifts, red wipes, mechanical curves" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:24px 28px;font-family:var(--font-sans);color:var(--text-muted);}
  .row{display:flex;gap:18px;align-items:stretch;}
  .demo{flex:1;background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;overflow:hidden;position:relative;}
  .t{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-subtle);}
  .wipe{height:8px;background:var(--accent);margin-top:18px;transform-origin:left;animation:wipe 2.4s var(--ease-mech) infinite;}
  @keyframes wipe{0%{transform:scaleX(0)}45%,55%{transform:scaleX(1)}100%{transform:scaleX(1)}}
  .lift{margin-top:14px;height:30px;background:var(--accent);border-radius:var(--radius-md);animation:lift 1.8s var(--ease-out) infinite;}
  @keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  code{font-family:monospace;font-size:10px;color:var(--text-subtle);}
</style></head><body>
<div class="row">
  <div class="demo"><div class="t">Red wipe</div><div class="wipe"></div><div style="margin-top:14px"><code>--ease-mech</code></div></div>
  <div class="demo"><div class="t">Hover lift −2px</div><div class="lift"></div><div style="margin-top:14px"><code>--ease-out · 140ms</code></div></div>
</div>
</body></html>
