<!-- @dsCard group="Colors" viewport="700x130" name="Text & utility" subtitle="Grey text ramp + WhatsApp green" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;}
  .chip{height:56px;}
  .meta{padding:7px 10px;background:var(--surface-card);}
  .name{font-size:12px;font-weight:700;color:var(--white);}
  .hex{font-size:10px;color:var(--text-subtle);font-family:monospace;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">Text</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#A8A8A8"></div><div class="meta"><div class="name">Muted</div><div class="hex">--grey-200</div></div></div>
  <div class="sw"><div class="chip" style="background:#7A7A7A"></div><div class="meta"><div class="name">Subtle</div><div class="hex">--grey-300</div></div></div>
  <div class="sw"><div class="chip" style="background:#565656"></div><div class="meta"><div class="name">Faint</div><div class="hex">--grey-400</div></div></div>
  <div class="sw"><div class="chip" style="background:#25D366"></div><div class="meta"><div class="name">WhatsApp</div><div class="hex">#25D366</div></div></div>
</div>
</body></html>
