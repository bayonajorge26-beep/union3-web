<!-- @dsCard group="Colors" viewport="700x150" name="Brand core" subtitle="Red, black, white — the whole identity" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);padding:20px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;}
  .chip{height:74px;}
  .meta{padding:9px 11px;background:var(--surface-card);}
  .name{font-size:13px;font-weight:800;color:var(--white);text-transform:uppercase;letter-spacing:.04em;}
  .hex{font-size:11px;color:var(--text-subtle);font-family:monospace;margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#CC0000"></div><div class="meta"><div class="name">Rojo Unión</div><div class="hex">#CC0000 · --red-500</div></div></div>
  <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="meta"><div class="name">Negro</div><div class="hex">#0A0A0A · --black</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">Blanco</div><div class="hex">#FFFFFF · --white</div></div></div>
</div>
</body></html>
